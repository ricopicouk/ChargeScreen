<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="ChargeScreen MPPT dashboard mockup">
  <defs>
    <radialGradient id="bezel" cx="48%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#2c3335"/>
      <stop offset="63%" stop-color="#1b2224"/>
      <stop offset="76%" stop-color="#08090a"/>
      <stop offset="83%" stop-color="#252b2e"/>
      <stop offset="100%" stop-color="#050606"/>
    </radialGradient>
    <radialGradient id="screen" cx="48%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#348a23"/>
      <stop offset="55%" stop-color="#278117"/>
      <stop offset="100%" stop-color="#19720f"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#10232b" flood-opacity=".28"/>
    </filter>
    <filter id="screenGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="246" fill="#050606" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="238" fill="url(#bezel)"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#0b0d0e" stroke-width="10"/>
  <circle cx="256" cy="256" r="213" fill="none" stroke="#30383b" stroke-width="5" opacity=".65"/>
  <circle cx="256" cy="256" r="194" fill="url(#screen)"/>
  <circle cx="256" cy="256" r="194" fill="none" stroke="#145e0c" stroke-width="2" opacity=".7"/>

  <g fill="none" stroke-linecap="butt">
    <g stroke="#fff027" stroke-width="28">
      <path d="M 141.5 394.9 A 180 180 0 0 1 84.8 311.6"/>
      <path d="M 82.1 302.6 A 180 180 0 0 1 84.3 201.9"/>
      <path d="M 87.4 193 A 180 180 0 0 1 147.7 112.2"/>
      <path d="M 155.3 106.8 A 180 180 0 0 1 251.3 76.1"/>
      <path d="M 260.7 76.1 A 180 180 0 0 1 356.7 106.8"/>
      <path d="M 364.3 112.2 A 180 180 0 0 1 424.6 193"/>
      <path d="M 427.7 201.9 A 180 180 0 0 1 429.9 302.6"/>
      <path d="M 427.2 311.6 A 180 180 0 0 1 370.5 394.9"/>
    </g>
    <path d="M 141.5 394.9 A 180 180 0 0 1 84.8 311.6" stroke="#ffc51f" stroke-width="28"/>
    <path d="M 82.1 302.6 A 180 180 0 0 1 84.3 201.9" stroke="#ffd91d" stroke-width="28"/>
    <path d="M 427.2 311.6 A 180 180 0 0 1 370.5 394.9" stroke="#a4ef10" stroke-width="28"/>
  </g>

  <circle cx="256" cy="256" r="155" fill="url(#screen)" filter="url(#screenGlow)" opacity=".82"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="256" y="151" fill="#fff58a" font-size="16" font-weight="800" letter-spacing=".5">PV POWER</text>
    <text x="256" y="220" fill="#f9ffff" font-size="68" font-weight="300">268 W</text>
  </g>

  <g stroke="#fff58a" stroke-width="1.4" opacity=".78">
    <line x1="256" y1="246" x2="256" y2="326"/>
    <line x1="151" y1="310" x2="361" y2="310"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="202" y="288" fill="#f9ffff" font-size="30" font-weight="350">14.4 V</text>
    <text x="202" y="306" fill="#fff58a" font-size="15" font-weight="800">BATTERY</text>
    <text x="310" y="288" fill="#f9ffff" font-size="30" font-weight="350">18.6 A</text>
    <text x="310" y="306" fill="#fff58a" font-size="15" font-weight="800">CHARGE</text>
    <text x="256" y="352" fill="#f9ffff" font-size="32" font-weight="350">1.27 kWh</text>
    <text x="256" y="371" fill="#fff58a" font-size="15" font-weight="800">TODAY</text>
  </g>

  <g fill="#f9ffff">
    <circle cx="256" cy="406" r="3.2"/>
    <circle cx="256" cy="419" r="3.2"/>
    <circle cx="256" cy="432" r="3.2"/>
  </g>
